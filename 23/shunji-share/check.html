<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B0907">
<title>裝置檢測 · 能不能貼進社群</title>
<style>
  :root{
    --bg:#0B0907; --card:#141009; --gold:#E7CB92; --gold-soft:#C9A96B;
    --ink:#F0E8DB; --muted:#948A7E; --hair:rgba(231,203,146,.18);
    --edge:rgba(231,203,146,.28); --line:#06C755;
    --ok:#5FD08A; --no:#D97C6E;
    --sans:"PingFang TC","Noto Sans CJK TC","Noto Sans TC",-apple-system,sans-serif;
    --serif:"Songti TC","Noto Serif CJK TC","Noto Serif TC",serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}
  body{margin:0;min-height:100dvh;background:var(--bg);color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;padding:28px 16px 48px}
  .wrap{width:100%;max-width:440px}
  h1{font-family:var(--serif);font-size:24px;color:var(--gold);letter-spacing:.1em;
    margin:0 0 6px;text-align:center}
  .sub{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:26px;line-height:1.7}

  .panel{background:var(--card);border:1px solid var(--edge);border-radius:16px;
    padding:6px 18px;margin-bottom:20px}
  .item{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:15px 0;border-bottom:1px solid var(--hair);font-size:14.5px}
  .item:last-child{border-bottom:0}
  .item .k{color:var(--muted)}
  .item .k b{display:block;color:var(--ink);font-weight:600;font-size:15px;margin-bottom:3px}
  .v{font-weight:700;white-space:nowrap;font-size:14px}
  .v.ok{color:var(--ok)} .v.no{color:var(--no)} .v.wait{color:var(--muted)}

  .verdict{border-radius:14px;padding:18px;margin-bottom:22px;font-size:14.5px;line-height:1.8;
    border:1px solid var(--hair);background:rgba(255,255,255,.03)}
  .verdict.good{border-color:rgba(95,208,138,.4);background:rgba(95,208,138,.07)}
  .verdict.bad{border-color:rgba(217,124,110,.4);background:rgba(217,124,110,.07)}
  .verdict h2{margin:0 0 8px;font-size:16px;font-family:var(--serif);letter-spacing:.06em}
  .verdict.good h2{color:var(--ok)} .verdict.bad h2{color:var(--no)}
  .verdict p{margin:0;color:var(--muted)}

  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    border-radius:14px;font-family:var(--serif);font-size:18px;font-weight:700;
    letter-spacing:.06em;padding:17px 12px;border:1px solid transparent;cursor:pointer}
  .btn:active{transform:scale(.985)}
  .btn-line{background:var(--line);color:#fff;box-shadow:0 0 26px -8px rgba(6,199,85,.5)}
  .btn[disabled]{opacity:.4;pointer-events:none}
  .hint{margin-top:14px;color:var(--muted);font-size:13px;line-height:1.85;
    border-left:2px solid var(--edge);padding-left:12px}
  .hint b{color:var(--gold-soft)}
  .thumb{margin:0 auto 18px;display:block;width:52%;max-width:170px;border-radius:9px;
    border:1px solid var(--hair)}
  .ua{margin-top:24px;font-size:11px;color:rgba(148,138,126,.55);word-break:break-all;
    line-height:1.6;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>能不能貼進社群？</h1>
  <div class="sub">用你的手機開這頁，30 秒測完。<br>Web Share 需要 HTTPS，請從 GitHub Pages 開，不要用 file://</div>

  <div class="panel" id="panel">
    <div class="item"><span class="k"><b>安全連線</b>HTTPS</span><span class="v wait" id="v-https">…</span></div>
    <div class="item"><span class="k"><b>訂單圖片</b>canvas 產圖</span><span class="v wait" id="v-img">…</span></div>
    <div class="item"><span class="k"><b>圖片分享</b>navigator.share({files})</span><span class="v wait" id="v-file">…</span></div>
    <div class="item"><span class="k"><b>文字分享</b>navigator.share({text})</span><span class="v wait" id="v-text">…</span></div>
    <div class="item"><span class="k"><b>LINE 內建瀏覽器</b>User-Agent 判斷</span><span class="v wait" id="v-line">…</span></div>
  </div>

  <div class="verdict" id="verdict"><h2>檢測中…</h2><p>稍等一下。</p></div>

  <img class="thumb" id="thumb" alt="測試用訂單圖" hidden>

  <button class="btn btn-line" id="go" disabled>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
      <path d="M12 2C6.5 2 2 5.6 2 10c0 4 3.6 7.3 8.4 7.9.3.07.8.22.9.5.1.26.06.66.03.92l-.14.86c-.04.25-.2 1 .87.55 1.07-.46 5.77-3.4 7.87-5.82C21.3 13.3 22 11.7 22 10c0-4.4-4.5-8-10-8Z"/>
    </svg>
    實測：把測試圖丟進社群
  </button>

  <div class="hint">
    按下去之後，在 LINE 的傳送對象清單裡<b>找你那個社群</b>。<br>
    找得到 → 主線完全通，直接上線。<br>
    找不到 → 用備援：<b>儲存圖片 → 進社群 → 相簿選最新一張 → 送出</b>。
  </div>

  <div class="ua" id="ua"></div>
</div>

<script src="./shunji-share.js"></script>
<script>
const $ = s => document.querySelector(s);
const set = (id, ok, txt) => {
  const el = $(id);
  el.className = 'v ' + (ok ? 'ok' : 'no');
  el.textContent = txt || (ok ? '✓ 可用' : '✗ 不支援');
};

ShunjiShare.config({ brand:'順記', brandSub:'裝置檢測用測試圖', footer:'這是一張測試圖，可以直接刪掉' })
  .setOrder({
    code:'TEST-0000', mode:'測試', when:new Date().toLocaleString('zh-TW',{hour12:false}),
    items:[{ name:'這是一張測試圖，看得到就代表產圖正常', qty:1, price:0 }],
    total:0
  });

const secure = window.isSecureContext;   // localhost 也算安全內容，別只看 protocol
set('#v-https', secure, secure ? '✓ 是' : '✗ 否');

ShunjiShare.ready().then(() => {
  const c = ShunjiShare.caps();

  set('#v-img',  c.imageReady, c.imageReady ? '✓ 正常' : '✗ 失敗');
  set('#v-file', c.shareFile);
  set('#v-text', c.shareText);
  set('#v-line', c.inLine, c.inLine ? '是' : '否');
  $('#v-line').className = 'v wait';

  const url = ShunjiShare.imageUrl();
  if (url){ $('#thumb').src = url; $('#thumb').hidden = false; }

  const v = $('#verdict');
  if (c.shareFile) {
    v.className = 'verdict good';
    v.innerHTML = '<h2>主線可用 —— 走圖片</h2><p>這台裝置支援圖片分享。按下面的按鈕實測一次，' +
                  '確認 LINE 的清單裡列得出你的社群，就可以上線了。</p>';
    $('#go').disabled = false;
  } else if (c.shareText) {
    v.className = 'verdict';
    v.innerHTML = '<h2>只能走文字</h2><p>圖片分享不支援，但文字分享可以。' +
                  '模組會自動降級成文字，訂單一樣送得出去。</p>';
    $('#go').disabled = false;
  } else if (!secure) {
    v.className = 'verdict bad';
    v.innerHTML = '<h2>不是 HTTPS</h2><p>Web Share 只在 HTTPS 下運作。把檔案推上 GitHub Pages，' +
                  '再用手機開一次，這頁的結果才算數。</p>';
  } else {
    v.className = 'verdict bad';
    v.innerHTML = '<h2>此裝置不支援系統分享</h2><p>多半是桌機瀏覽器。用手機再測一次。' +
                  '模組在這種情況會自動退回「複製文字 + 開啟 LINE」。</p>';
    $('#go').disabled = false;
  }
});

$('#go').addEventListener('click', () => {
  ShunjiShare.share().then(r => {
    const v = $('#verdict');
    if (r === 'image' || r === 'text') {
      v.className = 'verdict good';
      v.innerHTML = '<h2>送出去了</h2><p>去社群看看那張測試圖有沒有進去。有 → 收工，把 order.html 上線。</p>';
    }
  }).catch(()=>{});
});

$('#ua').textContent = navigator.userAgent;
</script>
</body>
</html>
