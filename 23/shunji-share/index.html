<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B0907">
<title>順記 · 線上點餐</title>
<style>
  :root{
    --bg:#0B0907; --card-1:#1B1510; --card-2:#110D0A; --bar:#15100B;
    --gold:#E7CB92; --gold-soft:#C9A96B; --ink:#F0E8DB; --muted:#948A7E;
    --hair:rgba(231,203,146,.16); --edge:rgba(231,203,146,.30);
    --no:#D97C6E;
    --serif:"Songti TC","Noto Serif CJK TC","Noto Serif TC",serif;
    --sans:"PingFang TC","Noto Sans CJK TC","Noto Sans TC",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased}
  body{min-height:100dvh;padding:0 0 132px}
  .wrap{width:100%;max-width:460px;margin:0 auto;padding:0 16px}

  /* ── 抬頭 ── */
  header{padding:26px 0 8px;text-align:center}
  .hero{width:100%;aspect-ratio:16/7;object-fit:cover;border-radius:16px;
    border:1px solid var(--hair);display:block;margin-bottom:18px}
  .logo{width:66px;height:66px;object-fit:cover;border-radius:50%;
    border:1px solid var(--edge);margin:0 auto 12px;display:block}
  .brand{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:.24em;
    color:var(--gold);margin:0 0 8px;text-indent:.24em}
  .sub{color:var(--muted);font-size:13.5px;letter-spacing:.12em;margin:0}
  .notice{margin-top:16px;border:1px solid var(--edge);border-radius:12px;
    background:rgba(231,203,146,.06);color:var(--gold-soft);font-size:13.5px;
    line-height:1.7;padding:11px 14px;text-align:left}

  /* ── 分類 ── */
  .cats{position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg) 70%,rgba(11,9,7,0));
    padding:16px 0 12px;margin-top:12px}
  .cats-in{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .cats-in::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:transparent;border:1px solid var(--hair);color:var(--muted);
    border-radius:999px;padding:8px 16px;font-size:13.5px;font-family:var(--sans);
    letter-spacing:.06em;cursor:pointer;transition:.16s}
  .chip[aria-pressed="true"]{border-color:var(--edge);background:rgba(231,203,146,.1);color:var(--gold)}

  /* ── 商品 ── */
  .list{display:flex;flex-direction:column;gap:12px}
  .item{display:grid;grid-template-columns:92px 1fr;gap:14px;
    background:linear-gradient(180deg,var(--card-1),var(--card-2));
    border:1px solid var(--hair);border-radius:16px;padding:12px}
  .item.out{opacity:.45}
  .thumb{width:92px;height:92px;object-fit:cover;border-radius:11px;
    border:1px solid var(--hair);background:#14100C;display:block}
  .body{display:flex;flex-direction:column;min-width:0}
  .name{font-size:16px;font-weight:600;line-height:1.35;margin:1px 0 3px;
    word-break:break-word}
  .desc{color:var(--muted);font-size:12.5px;line-height:1.5;margin-bottom:6px;
    word-break:break-word}
  .tail{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto}
  .price{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--gold);
    font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .stock{font-size:11.5px;color:var(--muted);letter-spacing:.06em;margin-top:2px}
  .stock.low{color:var(--gold-soft)}
  .stock.zero{color:var(--no)}

  /* 加減 */
  .step{display:flex;align-items:center;gap:2px}
  .step button{width:32px;height:32px;border-radius:9px;border:1px solid var(--edge);
    background:transparent;color:var(--gold);font-size:19px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:var(--sans);
    transition:.14s}
  .step button:active{transform:scale(.92)}
  .step button:disabled{opacity:.3;cursor:not-allowed}
  .step .plus{background:rgba(231,203,146,.1)}
  .step .qty{min-width:30px;text-align:center;font-size:16px;font-weight:700;
    font-variant-numeric:tabular-nums;color:var(--ink)}
  .step .minus[hidden],.step .qty[hidden]{display:none}
  .soldout{font-size:12.5px;color:var(--no);letter-spacing:.1em;border:1px solid rgba(217,124,110,.4);
    border-radius:8px;padding:6px 10px}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:48px 0;line-height:2}

  /* ── 底部結帳條：撕票口 ── */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--bar);
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    box-shadow:0 -18px 40px -18px rgba(0,0,0,.95);
    transform:translateY(120%);transition:transform .28s cubic-bezier(.2,.9,.3,1)}
  .bar.on{transform:translateY(0)}
  .bar .tear{position:absolute;left:0;top:-10px;width:100%;height:10px;display:block}
  .bar-in{max-width:460px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .sum{flex:1;min-width:0;line-height:1.35}
  .sum .cnt{display:block;font-size:11.5px;color:var(--muted);letter-spacing:.14em}
  .sum .amt{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--gold);
    font-variant-numeric:tabular-nums}

  .btn{border:1px solid transparent;border-radius:13px;font-family:var(--serif);
    font-weight:700;letter-spacing:.1em;cursor:pointer;transition:transform .12s,filter .18s;
    display:flex;align-items:center;justify-content:center}
  .btn:active{transform:scale(.985)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .btn-gold{background:var(--gold);color:#1A130B;font-size:17px;padding:15px 30px;
    box-shadow:0 0 26px -8px rgba(231,203,146,.55)}
  .btn-gold:disabled{opacity:.4;box-shadow:none;cursor:not-allowed}
  .btn-ghost{background:transparent;border-color:var(--edge);color:var(--gold);
    font-size:16px;padding:14px}
  .btn-block{width:100%}

  /* ── 結帳面板 ── */
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:30;opacity:0;
    transition:opacity .24s;backdrop-filter:blur(2px)}
  .mask.on{opacity:1}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;max-height:92dvh;overflow-y:auto;
    background:linear-gradient(180deg,#1C160F,#100C09);
    border-top:1px solid var(--edge);border-radius:22px 22px 0 0;
    padding:8px 18px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);
    -webkit-overflow-scrolling:touch}
  .sheet.on{transform:translateY(0)}
  .grab{width:42px;height:4px;border-radius:99px;background:rgba(231,203,146,.28);
    margin:8px auto 18px}
  .sheet h2{font-family:var(--serif);font-size:19px;letter-spacing:.14em;color:var(--gold);
    margin:0 0 18px;text-align:center}
  .sec{margin-bottom:18px}
  .lab{display:block;font-size:12px;color:var(--muted);letter-spacing:.14em;margin-bottom:8px}
  .lab .req{color:var(--gold-soft)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--hair);
    border-radius:11px;color:var(--ink);font-family:var(--sans);font-size:16px;
    padding:13px 14px;outline:none;transition:border-color .16s}
  input:focus,textarea:focus{border-color:var(--edge)}
  input::placeholder,textarea::placeholder{color:rgba(148,138,126,.55)}
  textarea{resize:vertical;min-height:74px;line-height:1.6}
  input[type="datetime-local"]{color-scheme:dark}
  .recap{border:1px dashed var(--hair);border-radius:12px;padding:13px 15px;margin-bottom:18px}
  .recap .r{display:flex;justify-content:space-between;gap:12px;font-size:14px;padding:4px 0}
  .recap .r span:last-child{color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap}
  .recap .tot{border-top:1px solid var(--hair);margin-top:8px;padding-top:10px;font-weight:700}
  .err{color:var(--no);font-size:13px;letter-spacing:.04em;margin:-6px 0 12px;min-height:0}

  /* ── 其他 ── */
  .foot{text-align:center;padding:34px 0 8px}
  .foot a{color:rgba(148,138,126,.5);font-size:12px;letter-spacing:.16em;text-decoration:none;
    border-bottom:1px solid rgba(148,138,126,.2);padding-bottom:2px}
  .foot a:hover{color:var(--gold-soft)}
  .draft{max-width:460px;margin:14px auto 0;text-align:center;font-size:12px;
    color:var(--gold-soft);letter-spacing:.05em}

  .toast{position:fixed;left:50%;bottom:112px;transform:translate(-50%,16px);z-index:40;
    background:#1E1811;border:1px solid var(--edge);color:var(--gold);padding:12px 20px;
    border-radius:999px;font-size:14px;letter-spacing:.05em;opacity:0;pointer-events:none;
    transition:.24s;max-width:88vw;text-align:center}
  .toast.on{opacity:1;transform:translate(-50%,0)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <img class="hero" id="hero" alt="" hidden>
    <img class="logo" id="logo" alt="" hidden>
    <h1 class="brand" id="brand">順記</h1>
    <p class="sub" id="brandSub"></p>
    <div class="notice" id="notice" hidden></div>
  </header>

  <nav class="cats" id="cats" hidden aria-label="商品分類">
    <div class="cats-in" id="catsIn"></div>
  </nav>

  <main class="list" id="list"></main>

  <div class="draft" id="draft" hidden>本機預覽 · 這些是你在後台改過、還沒發佈的內容</div>

  <div class="foot"><a href="admin.html">後台</a></div>
</div>

<!-- 底部結帳條（撕票口） -->
<div class="bar" id="bar">
  <svg class="tear" id="tear" viewBox="0 0 600 10" preserveAspectRatio="none" aria-hidden="true"></svg>
  <div class="bar-in">
    <div class="sum">
      <span class="cnt" id="cnt">0 件</span>
      <span class="amt" id="sum">NT$0</span>
    </div>
    <button class="btn btn-gold" id="next">下一步</button>
  </div>
</div>

<!-- 結帳 -->
<div class="mask" id="mask" hidden></div>
<section class="sheet" id="sheet" hidden role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="grab"></div>
  <h2 id="sheetTitle">確認訂單</h2>

  <div class="recap" id="recap"></div>

  <div class="sec">
    <span class="lab">取餐方式</span>
    <div class="row" id="modes"></div>
  </div>

  <div class="sec">
    <span class="lab">取餐時間</span>
    <div class="row" id="whens">
      <button class="chip" id="whenNow" aria-pressed="true">盡快</button>
      <button class="chip" id="whenPick" aria-pressed="false">指定時間</button>
    </div>
    <div style="margin-top:8px" id="whenBox" hidden>
      <input type="datetime-local" id="whenAt">
    </div>
  </div>

  <div class="sec">
    <span class="lab">姓名 <span class="req">必填</span></span>
    <input id="cName" placeholder="王小明" autocomplete="name">
  </div>

  <div class="sec">
    <span class="lab">電話 <span class="req">必填</span></span>
    <input id="cPhone" type="tel" placeholder="0912-345-678" autocomplete="tel" inputmode="tel">
  </div>

  <div class="sec" id="addrBox">
    <span class="lab">外送地址 <span class="req">必填</span></span>
    <input id="cAddr" placeholder="新北市板橋區文化路一段188巷12弄5號7樓之3" autocomplete="street-address">
  </div>

  <div class="sec">
    <span class="lab">備註</span>
    <textarea id="cNote" placeholder="不要香菜、飯少一點…"></textarea>
  </div>

  <div class="err" id="err"></div>

  <button class="btn btn-gold btn-block" id="submit" style="padding:17px">送出訂單</button>
  <button class="btn btn-ghost btn-block" id="back" style="margin-top:10px">再看看</button>
</section>

<div class="toast" id="toast"></div>

<script src="./shunji-store.js"></script>
<script>
(function(){
  'use strict';
  var S = window.ShunjiStore;
  var $ = function(s){ return document.querySelector(s); };
  var esc = S.esc;

  var cart = {};          // { itemId: qty }
  var cat  = '全部';
  var mode = '';
  var whenMode = 'now';

  /* ── 撕票口鋸齒 ── */
  (function(){
    var W = 600, D = 10, n = 30, t = W / n, d = 'M0 ' + D;
    for (var i = 0; i < n; i++) d += ' L' + (i * t + t / 2) + ' 0 L' + ((i + 1) * t) + ' ' + D;
    var fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fill.setAttribute('d', d + ' L' + W + ' ' + D + ' L0 ' + D + ' Z');
    fill.setAttribute('fill', '#15100B');
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('d', d);
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', 'rgba(231,203,146,.3)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('vector-effect', 'non-scaling-stroke');
    $('#tear').appendChild(fill);
    $('#tear').appendChild(line);
  })();

  function toast(m){
    var t = $('#toast'); t.textContent = m; t.classList.add('on');
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove('on'); }, 2400);
  }

  /* ── 畫面 ── */
  function render(){
    var d = S.data(), st = d.settings;
    var items = d.items.filter(function(i){ return i.on; });

    document.title = st.brand + ' · 線上點餐';
    $('#brand').textContent = st.brand || '';
    $('#brandSub').textContent = st.brandSub || '';
    if (st.hero){ $('#hero').src = st.hero; $('#hero').hidden = false; } else $('#hero').hidden = true;
    if (st.logo){ $('#logo').src = st.logo; $('#logo').hidden = false; } else $('#logo').hidden = true;
    if (st.notice){ $('#notice').textContent = st.notice; $('#notice').hidden = false; } else $('#notice').hidden = true;
    $('#draft').hidden = !S.isDirty();

    // 分類
    var cats = [];
    items.forEach(function(i){ if (i.cat && cats.indexOf(i.cat) < 0) cats.push(i.cat); });
    if (cats.length > 1){
      if (cats.indexOf(cat) < 0 && cat !== '全部') cat = '全部';
      $('#catsIn').innerHTML = ['全部'].concat(cats).map(function(c){
        return '<button class="chip" data-cat="' + esc(c) + '" aria-pressed="' +
               (c === cat) + '">' + esc(c) + '</button>';
      }).join('');
      $('#cats').hidden = false;
    } else {
      cat = '全部';
      $('#cats').hidden = true;
    }

    // 清單
    var show = items.filter(function(i){ return cat === '全部' || i.cat === cat; });
    if (!show.length){
      $('#list').innerHTML = '<div class="empty">這個分類還沒有商品。<br>到後台新增，或先看看別的分類。</div>';
    } else {
      $('#list').innerHTML = show.map(card).join('');
    }
    syncBar();
  }

  function stepHTML(i){
    var q    = cart[i.id] || 0;
    var full = (i.stock != null && q >= i.stock);
    return '<button class="minus" data-d="-1" aria-label="減少 ' + esc(i.name) + '"' + (q ? '' : ' hidden') + '>−</button>' +
           '<span class="qty"' + (q ? '' : ' hidden') + '>' + q + '</span>' +
           '<button class="plus" data-d="1" aria-label="增加 ' + esc(i.name) + '"' + (full ? ' disabled' : '') + '>＋</button>';
  }

  function card(i){
    var out = (i.stock === 0);
    var stk = i.stock == null ? ''
            : out ? '<div class="stock zero">已售完</div>'
            : '<div class="stock' + (i.stock <= 5 ? ' low' : '') + '">剩 ' + i.stock + ' 份</div>';

    return '<article class="item' + (out ? ' out' : '') + '">' +
      '<img class="thumb" src="' + esc(S.imgOf(i)) + '" alt="' + esc(i.name) + '" loading="lazy">' +
      '<div class="body">' +
        '<div class="name">' + esc(i.name) + '</div>' +
        (i.desc ? '<div class="desc">' + esc(i.desc) + '</div>' : '') +
        '<div class="tail">' +
          '<div><span class="price">' + S.money(i.price) + '</span>' + stk + '</div>' +
          (out ? '<span class="soldout">售完</span>'
               : '<div class="step" data-id="' + esc(i.id) + '">' + stepHTML(i) + '</div>') +
        '</div>' +
      '</div></article>';
  }

  function lines(){
    var map = {};
    S.items().forEach(function(i){ map[i.id] = i; });
    return Object.keys(cart).filter(function(id){ return cart[id] > 0 && map[id]; })
      .map(function(id){
        var i = map[id];
        return { id: id, name: i.name, unit: i.price, qty: cart[id], sub: i.price * cart[id] };
      });
  }

  function syncBar(){
    var L = lines();
    var n = L.reduce(function(a, x){ return a + x.qty; }, 0);
    var t = L.reduce(function(a, x){ return a + x.sub; }, 0);
    $('#cnt').textContent = n + ' 件';
    $('#sum').textContent = S.money(t);
    $('#bar').classList.toggle('on', n > 0);
    $('#next').disabled = !n;
  }

  /* ── 互動 ── */
  document.addEventListener('click', function(e){
    var el = e.target;
    if (!el || !el.closest) return;

    var chip = el.closest('#catsIn .chip');
    if (chip){ cat = chip.dataset.cat; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); return; }

    var b = el.closest('.step button');
    if (!b) return;

    var box = b.closest('.step');
    var id  = box.dataset.id;
    var it  = S.items().filter(function(x){ return x.id === id; })[0];
    if (!it) return;

    var q = (cart[id] || 0) + parseInt(b.dataset.d, 10);
    if (it.stock != null && q > it.stock){
      q = it.stock;
      toast('「' + it.name + '」只剩 ' + it.stock + ' 份');
    }
    cart[id] = Math.max(0, q);
    if (!cart[id]) delete cart[id];

    box.innerHTML = stepHTML(it);      // 只重畫這一顆，圖片不會閃
    syncBar();
  });

  /* ── 結帳 ── */
  function openSheet(){
    var st = S.settings();
    var L = lines();
    if (!L.length) return;

    $('#recap').innerHTML = L.map(function(x){
      return '<div class="r"><span>' + esc(x.name) + ' ×' + x.qty + '</span><span>' + S.money(x.sub) + '</span></div>';
    }).join('') +
    '<div class="r tot"><span>合計</span><span>' +
      S.money(L.reduce(function(a, x){ return a + x.sub; }, 0)) + '</span></div>';

    var modes = st.modes;
    if (!mode || modes.indexOf(mode) < 0) mode = modes[0];
    $('#modes').innerHTML = modes.map(function(m){
      return '<button class="chip" data-mode="' + esc(m) + '" aria-pressed="' + (m === mode) + '">' + esc(m) + '</button>';
    }).join('');
    syncAddr();

    $('#mask').hidden = false; $('#sheet').hidden = false;
    requestAnimationFrame(function(){ $('#mask').classList.add('on'); $('#sheet').classList.add('on'); });
  }

  function closeSheet(){
    $('#mask').classList.remove('on'); $('#sheet').classList.remove('on');
    setTimeout(function(){ $('#mask').hidden = true; $('#sheet').hidden = true; }, 260);
  }

  function syncAddr(){ $('#addrBox').hidden = (mode !== '外送'); }

  $('#next').addEventListener('click', openSheet);
  $('#back').addEventListener('click', closeSheet);
  $('#mask').addEventListener('click', closeSheet);

  $('#modes').addEventListener('click', function(e){
    var b = e.target.closest('.chip'); if (!b) return;
    mode = b.dataset.mode;
    [].forEach.call(this.children, function(c){ c.setAttribute('aria-pressed', c === b); });
    syncAddr();
  });

  $('#whenNow').addEventListener('click', function(){
    whenMode = 'now';
    $('#whenNow').setAttribute('aria-pressed', 'true');
    $('#whenPick').setAttribute('aria-pressed', 'false');
    $('#whenBox').hidden = true;
  });
  $('#whenPick').addEventListener('click', function(){
    whenMode = 'pick';
    $('#whenNow').setAttribute('aria-pressed', 'false');
    $('#whenPick').setAttribute('aria-pressed', 'true');
    $('#whenBox').hidden = false;
    if (!$('#whenAt').value){
      var d = new Date(Date.now() + 30 * 60000 - new Date().getTimezoneOffset() * 60000);
      $('#whenAt').value = d.toISOString().slice(0, 16);
    }
  });

  $('#submit').addEventListener('click', function(){
    var st = S.settings(), L = lines(), E = $('#err');
    E.textContent = '';
    if (!L.length) return;

    var total = L.reduce(function(a, x){ return a + x.sub; }, 0);
    var name  = $('#cName').value.trim();
    var phone = $('#cPhone').value.trim();
    var addr  = $('#cAddr').value.trim();
    var note  = $('#cNote').value.trim();

    if (!name)  return fail('請填姓名', '#cName');
    if (!phone) return fail('請填電話', '#cPhone');
    if (mode === '外送' && !addr) return fail('外送要填地址', '#cAddr');
    if (mode === '外送' && st.minOrder > 0 && total < st.minOrder)
      return fail('外送最低消費 ' + S.money(st.minOrder) + '，還差 ' + S.money(st.minOrder - total));

    var when = '盡快';
    if (whenMode === 'pick'){
      var v = $('#whenAt').value;
      if (!v) return fail('請選取餐時間', '#whenAt');
      when = S.whenText(new Date(v));
    }

    var order = {
      code : S.newCode(st.codePrefix),
      mode : mode,
      when : when,
      items: L.map(function(x){ return { name: x.name, qty: x.qty, price: x.sub }; }),
      total: total,
      note : note,
      customer: { name: name, phone: phone, address: mode === '外送' ? addr : '' }
    };

    try { sessionStorage.setItem('shunji_order', JSON.stringify(order)); }
    catch (e){ return fail('瀏覽器擋住了暫存，請關閉無痕模式再試一次'); }
    location.href = 'order.html';

    function fail(msg, sel){
      E.textContent = msg;
      if (sel) { $(sel).focus(); }
      E.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  });

  /* ── 啟動 ── */
  S.onChange(render);
  render();          // 先用本機資料畫（快）
  S.refresh();       // 再去抓網站上的最新菜單
})();
</script>
</body>
</html>
