<!--
  ══════════════════════════════════════════════════════════════
  最小整合片段 —— 貼進你「現有的」訂單完成頁就好
  （如果你懶得改現有頁面，直接用 order.html，不用看這個檔）
  ══════════════════════════════════════════════════════════════

  這個檔本身不是網頁，是給你複製貼上的三塊東西：
    A. 按鈕的 HTML
    B. 按鈕的 CSS
    C. 接線的 JS

  貼完就有「貼到 LINE 社群」的功能，其餘原本的東西都不用動。
-->


<!-- ─────────────────────────────────────────────
     A. HTML：貼在你原本三個按鈕的位置
     ───────────────────────────────────────────── -->

<button class="sj-btn sj-btn-line" id="sj-go">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
    <path d="M12 2C6.5 2 2 5.6 2 10c0 4 3.6 7.3 8.4 7.9.3.07.8.22.9.5.1.26.06.66.03.92l-.14.86c-.04.25-.2 1 .87.55 1.07-.46 5.77-3.4 7.87-5.82C21.3 13.3 22 11.7 22 10c0-4.4-4.5-8-10-8Z"/>
  </svg>
  <span>貼到 LINE 社群
    <small>分享 → 選 LINE → 選社群 → 送出</small>
  </span>
</button>

<div class="sj-alt">
  <button id="sj-save">儲存圖片</button>
  <span>·</span>
  <button id="sj-copy">只複製文字</button>
</div>


<!-- ─────────────────────────────────────────────
     B. CSS：貼進你的 <style> 或 .css
     ───────────────────────────────────────────── -->
<style>
.sj-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  border-radius:14px;font-size:19px;font-weight:700;letter-spacing:.08em;
  padding:17px 12px;border:1px solid transparent;cursor:pointer;
  font-family:"Songti TC","Noto Serif TC",serif;
  transition:transform .12s ease}
.sj-btn:active{transform:scale(.985)}
.sj-btn:focus-visible{outline:2px solid #E7CB92;outline-offset:3px}
.sj-btn-line{background:#06C755;color:#fff;box-shadow:0 0 26px -6px rgba(6,199,85,.55)}
.sj-btn-line small{display:block;font-family:"PingFang TC",sans-serif;font-size:12px;
  font-weight:400;letter-spacing:.04em;opacity:.85;margin-top:3px}
.sj-alt{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:14px}
.sj-alt button{background:none;border:0;color:#948A7E;font-size:13.5px;cursor:pointer;
  padding:6px 8px;text-decoration:underline;text-underline-offset:3px}
.sj-alt span{color:rgba(148,138,126,.35)}
</style>


<!-- ─────────────────────────────────────────────
     C. JS：貼在頁面底部（</body> 之前）
     ───────────────────────────────────────────── -->
<script src="./shunji-share.js"></script>
<script>
  // ①  設定：填你的社群連結
  ShunjiShare.config({
    brand: '順記',
    brandSub: '碳燒燒鵝 · 線上點餐',
    communityUrl: 'https://line.me/ti/g2/你的社群邀請碼'
  });

  // ②  把你現有的訂單物件餵進來（欄位名稱不一樣就自己對應一下）
  //     ⚠️ 關鍵：訂單一算出來就餵，不要等按鈕按下去才餵。
  //        模組會在背景先把圖畫好；iOS 規定 share() 必須在點擊當下同步呼叫，
  //        按下去才產圖 → 手勢授權過期 → NotAllowedError。
  ShunjiShare.setOrder({
    code : myOrder.id,                    // 'SJ0713-2678'
    mode : myOrder.deliveryType,          // '外送' / '自取'
    when : myOrder.pickupTime,            // '7/13（一）12:00'
    items: myOrder.cart.map(i => ({       // 對應你購物車的欄位
      name : i.title,
      qty  : i.count,
      price: i.subtotal
    })),
    total: myOrder.total,
    note : myOrder.remark,
    customer: {
      name   : myOrder.name,
      phone  : myOrder.phone,
      address: myOrder.address
    }
  });

  // ③  接按鈕（handler 不可以是 async）
  document.getElementById('sj-go').addEventListener('click', () => {
    ShunjiShare.share().catch(() => {});
  });
  document.getElementById('sj-save').addEventListener('click', () => ShunjiShare.saveImage());
  document.getElementById('sj-copy').addEventListener('click', () => ShunjiShare.copy());
</script>
